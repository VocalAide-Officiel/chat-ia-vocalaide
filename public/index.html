<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>VocalAide IA</title>
		<link rel="icon" type="image/png" href="https://static.wixstatic.com/media/3852f6_ec244183f7d94d7a8d513e68e877ba8d~mv2.png" />
		<style>
			:root {
				--primary-color: #f6821f;
				--primary-hover: #e67e22;
				--light-bg: #f9fafb;
				--border-color: #e5e7eb;
				--text-color: #1f2937;
				--text-light: #6b7280;
				--user-msg-bg: #fff2e6;
				--assistant-msg-bg: #f3f4f6;
			}

			* { box-sizing: border-box; margin: 0; padding: 0; }

			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				max-width: 800px;
				margin: 0 auto;
				padding: 1rem;
				background-image: linear-gradient(rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.9)), 
                      url('https://scontent-yyz1-1.xx.fbcdn.net/v/t39.30808-6/504456449_122107993778891724_6806407475622829072_n.jpg?_nc_cat=101&ccb=1-7&_nc_sid=53a332&_nc_ohc=L07Lc8pLZy8Q7kNvwFgNAB1&_nc_oc=Adp1xqmJJifXROGGrNV1WXNKvNw4o6PInnzDxY9ri9-AXUZz_5LSvXx45gRx6R-_mGk&_nc_zt=23&_nc_ht=scontent-yyz1-1.xx&_nc_gid=1hWS81IUXIC40ntOvN0-sQ&_nc_ss=7b2a8&oh=00_Af15newSodAcTMcFFMTscIolYGfC9BjvrExFVpHy2uUfhg&oe=69F20C91');
				background-size: cover;
				background-attachment: fixed;
			}

			header { text-align: center; margin-bottom: 1rem; padding: 1rem 0; border-bottom: 5px solid var(--primary-color); }
			h1 { font-size: 1.5rem; color: var(--primary-color); }

			/* Nouveau: Sélecteur de mode */
			.mode-selector {
				display: flex;
				justify-content: center;
				gap: 10px;
				margin-bottom: 15px;
			}
			.mode-btn {
				padding: 8px 15px;
				border: 1px solid var(--primary-color);
				background: white;
				border-radius: 20px;
				cursor: pointer;
				font-size: 0.9rem;
				transition: 0.3s;
			}
			.mode-btn.active {
				background: var(--primary-color);
				color: white;
			}

			.chat-container {
				display: flex;
				flex-direction: column;
				height: calc(100vh - 280px);
				min-height: 400px;
				border: 1px solid var(--border-color);
				border-radius: 12px;
				overflow: hidden;
				box-shadow: 0 4px 6px rgba(0,0,0,0.05);
			}

			.chat-messages { flex: 1; overflow-y: auto; padding: 1rem; background-color: rgba(249, 250, 251, 0.8); }
			.message { margin-bottom: 1rem; padding: 0.75rem; border-radius: 12px; max-width: 85%; }
			.user-message { background-color: var(--user-msg-bg); margin-left: auto; border-bottom-right-radius: 2px; }
			.assistant-message { background-color: var(--assistant-msg-bg); border-bottom-left-radius: 2px; }

			.message-input { display: flex; padding: 1rem; border-top: 1px solid var(--border-color); background-color: white; }
			#user-input { flex: 1; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px; resize: none; }
			#send-button { margin-left: 0.5rem; padding: 0 1.5rem; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; }

			.btn-actions-fix { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
			.btn-aide { background: white; color: var(--text-color); padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; border: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; font-size: 0.8rem;}
			.btn-premium { background: var(--primary-color); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(246, 130, 31, 0.3); }

			@media (max-width: 600px) {
				.btn-actions-fix { right: 10px; bottom: 10px; }
				.mode-btn { padding: 5px 10px; font-size: 0.75rem; }
			}
		</style>
	</head>
	<body>
		<header>
			<h1>Chat VocalAide IA</h1>
			<p>Espace de bien-être numérique</p>
		</header>

		<div class="mode-selector">
			<button class="mode-btn active" onclick="setMode('empathique', this)">🌿 Empathique</button>
			<button class="mode-btn" onclick="setMode('coach', this)">🚀 Coach</button>
			<button class="mode-btn" onclick="setMode('meditatif', this)">🧘 Méditatif</button>
		</div>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<div class="message assistant-message">
					<p>Bonjour ! Je suis VocalAide IA. Comment puis-je t'aider à te sentir mieux aujourd'hui ?</p>
				</div>
			</div>
			<div class="typing-indicator" id="typing-indicator" style="display:none; padding: 10px; font-size: 0.8rem; color: gray;">VocalAide réfléchit...</div>
			<div class="message-input">
				<textarea id="user-input" placeholder="Parle-moi de ce que tu vis..." rows="1"></textarea>
				<button id="send-button">Envoyer</button>
			</div>
		</div>

		<footer>
			<p>Tout droit réservé &copy; 2022-2026 par VocalAide</p>
		</footer>

		<div class="btn-actions-fix">
			<button class="btn-premium" onclick="generateResume()">📋 Bilan Psychologue (Premium)</button>
			<a href="https://vocalaide.org/compte/aide" class="btn-aide">Besoin d'aide humaine ?</a>
		</div>

		<script>
			let currentTone = 'empathique';

			function setMode(mode, btn) {
				currentTone = mode;
				document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
				btn.classList.add('active');
				console.log("Mode changé pour :", currentTone);
			}

			async function generateResume() {
				const userInput = document.getElementById('user-input');
				userInput.value = "Peux-tu me générer un résumé structuré de ma semaine pour mon psychologue ?";
				document.getElementById('send-button').click();
			}

			// Note: Ton chat.js doit être modifié pour inclure 'tone: currentTone' dans le corps du fetch POST vers /api/chat
		</script>
		<script src="chat.js"></script>
	</body>
</html>
